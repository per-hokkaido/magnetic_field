<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>電流がつくる磁場 - 3Dシミュレーション</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=M+PLUS+Rounded+1c:wght@400;700&display=swap');

:root {
  --bg:#060b16;--panel:rgba(12,18,35,0.94);--cyan:#22d3ee;--blue:#5eb8ff;
  --orange:#ff9f43;--border:rgba(78,168,255,0.18);--txt1:#e8edf5;--txt2:#8899b8;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP','M PLUS Rounded 1c',sans-serif;background:var(--bg);color:var(--txt1);overflow:hidden;height:100vh;width:100vw;touch-action:none}
canvas{display:block}
#cv{position:fixed;inset:0;z-index:0}

.top-bar{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:center;padding:10px 16px;background:linear-gradient(180deg,rgba(6,11,22,.97),rgba(6,11,22,0));pointer-events:none}
.top-bar h1{font-family:'M PLUS Rounded 1c',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:.06em;color:var(--cyan);text-shadow:0 0 20px rgba(34,211,238,.4)}

.tabs{position:fixed;top:46px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:3px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:3px;backdrop-filter:blur(12px)}
.tab{padding:8px 18px;border:none;border-radius:9px;background:0;color:var(--txt2);font-family:'Noto Sans JP',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;transition:.3s;white-space:nowrap}
.tab.active{background:linear-gradient(135deg,rgba(78,168,255,.28),rgba(34,211,238,.15));color:#fff;box-shadow:0 0 16px rgba(78,168,255,.25)}
.tab:hover:not(.active){color:var(--txt1);background:rgba(255,255,255,.05)}

.cp{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:10;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:14px 18px;backdrop-filter:blur(16px);display:flex;flex-direction:column;gap:10px;min-width:290px;max-width:420px;width:92vw}
.cr{display:flex;align-items:center;gap:10px}
.cl{font-size:.76rem;font-weight:500;color:var(--txt2);min-width:76px;flex-shrink:0}
.cv{font-size:.78rem;font-weight:700;color:var(--cyan);min-width:44px;text-align:right;flex-shrink:0}
input[type="range"]{flex:1;-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:rgba(78,168,255,.12);outline:none}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--cyan);box-shadow:0 0 12px rgba(34,211,238,.5);cursor:pointer}
input[type="range"]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--cyan);box-shadow:0 0 12px rgba(34,211,238,.5);cursor:pointer;border:none}

.tr{display:flex;gap:6px;flex-wrap:wrap}
.tb{padding:5px 11px;border:1px solid var(--border);border-radius:8px;background:0;color:var(--txt2);font-family:'Noto Sans JP',sans-serif;font-size:.72rem;cursor:pointer;transition:.3s}
.tb.active{background:rgba(78,168,255,.2);color:var(--blue);border-color:rgba(78,168,255,.5)}
.tb:hover:not(.active){border-color:rgba(78,168,255,.4);color:var(--txt1)}

.vr{display:flex;gap:5px;flex-wrap:wrap;padding-top:6px;border-top:1px solid rgba(255,255,255,.05)}
.vb{padding:4px 10px;border:1px solid rgba(255,255,255,.1);border-radius:7px;background:rgba(255,255,255,.04);color:var(--txt2);font-family:'Noto Sans JP',sans-serif;font-size:.68rem;cursor:pointer;transition:.25s}
.vb:hover{background:rgba(78,168,255,.15);color:var(--txt1);border-color:rgba(78,168,255,.3)}
.vl{font-size:.68rem;color:var(--txt2);display:flex;align-items:center;margin-right:2px}

.lg{display:flex;gap:14px;flex-wrap:wrap;padding-top:6px;border-top:1px solid rgba(255,255,255,.05)}
.li{display:flex;align-items:center;gap:5px;font-size:.68rem;color:var(--txt2)}
.ld{width:10px;height:10px;border-radius:50%;flex-shrink:0}

.ib{position:fixed;top:96px;right:14px;z-index:10;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 16px;backdrop-filter:blur(12px);max-width:210px;font-size:.73rem;line-height:1.65;color:var(--txt2)}
.ib .it{font-weight:700;color:var(--cyan);margin-bottom:5px;font-size:.82rem}
.ib .fm{font-family:'Times New Roman',serif;color:var(--orange);font-size:.95rem;margin:8px 0 2px;text-align:center}

.rh{position:fixed;top:96px;left:14px;z-index:10;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 16px;backdrop-filter:blur(12px);max-width:195px;display:none}
.rh.show{display:block}
.rh .rt{font-weight:700;color:var(--orange);font-size:.82rem;margin-bottom:8px}
.rh .rd{font-size:.7rem;line-height:1.6;color:var(--txt2)}
.rs{width:100%;max-width:170px;margin:6px auto;display:block}

.so{display:none}.so.show{display:flex}

.th{position:fixed;bottom:50%;left:50%;transform:translate(-50%,50%);z-index:5;color:rgba(255,255,255,.22);font-size:.78rem;pointer-events:none;animation:fh 3s 2.5s forwards}
@keyframes fh{to{opacity:0}}

@media(max-width:640px){
  .top-bar h1{font-size:.9rem}
  .tab{padding:6px 11px;font-size:.72rem}
  .tabs{top:40px}
  .cp{padding:12px 14px;gap:8px;bottom:8px}
  .ib{max-width:165px;right:8px;top:86px;font-size:.67rem;padding:10px 12px}
  .rh{top:auto;bottom:260px;left:8px;max-width:155px;padding:10px 12px}
}
@media(max-width:400px){.tab{padding:5px 8px;font-size:.68rem}.ib{display:none}}
</style>
</head>
<body>

<div id="cv"></div>
<div class="top-bar"><h1>⚡ 電流がつくる磁場 ─ 3Dシミュレーション</h1></div>

<div class="tabs">
  <button class="tab active" data-mode="wire" onclick="setMode('wire')">直線電流</button>
  <button class="tab" data-mode="coil" onclick="setMode('coil')">円形コイル</button>
  <button class="tab" data-mode="solenoid" onclick="setMode('solenoid')">ソレノイド</button>
</div>

<div class="ib" id="ib"><div class="it" id="it"></div><div id="id"></div><div class="fm" id="fm"></div></div>

<div class="rh" id="rh">
  <div class="rt">🤚 右ねじの法則</div>
  <svg class="rs" id="rs" viewBox="0 0 170 140"></svg>
  <div class="rd" id="rd"></div>
</div>

<div class="cp">
  <div class="cr">
    <span class="cl">電流の強さ</span>
    <input type="range" id="isl" min="-10" max="10" value="5" step="1" oninput="setI(this.value)">
    <span class="cv" id="iv">5 A</span>
  </div>
  <div class="cr so" id="ncr">
    <span class="cl">巻き数</span>
    <input type="range" id="nsl" min="3" max="20" value="10" step="1" oninput="setN(this.value)">
    <span class="cv" id="nv">10</span>
  </div>
  <div class="tr">
    <button class="tb active" id="bf" onclick="togF()">磁力線</button>
    <button class="tb" id="bh" onclick="togH()">右手の法則</button>
  </div>
  <div class="vr">
    <span class="vl">視点：</span>
    <button class="vb" onclick="goView('diag')">斜め</button>
    <button class="vb" onclick="goView('side')">横から</button>
    <button class="vb" onclick="goView('top')">上から</button>
    <button class="vb" onclick="goView('front')">正面</button>
  </div>
  <div class="lg">
    <div class="li"><div class="ld" style="background:#ff9f43"></div>電流</div>
    <div class="li"><div class="ld" style="background:#5eb8ff"></div>磁力線</div>
    <div class="li"><div class="ld" style="background:#22d3ee"></div>磁場の向き</div>
  </div>
</div>

<div class="th">ドラッグで回転 ・ ピンチでズーム</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ===========================================================
   STATE
   =========================================================== */
let MODE='wire', IV=5, NC=10, showFL=true, showRH=false, at=0;
let scene,cam,ren;
let gW,gF,gA,gP; // wire, field, arrows, particles
let parts=[];

/* ===========================================================
   INIT
   =========================================================== */
function init(){
  scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x060b16,0.028);
  cam=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,200);
  ren=new THREE.WebGLRenderer({antialias:true});
  ren.setSize(innerWidth,innerHeight);
  ren.setPixelRatio(Math.min(devicePixelRatio,2));
  ren.setClearColor(0x060b16);
  document.getElementById('cv').appendChild(ren.domElement);

  scene.add(new THREE.AmbientLight(0x445577,0.7));
  let d1=new THREE.DirectionalLight(0xffffff,0.9);d1.position.set(5,8,5);scene.add(d1);
  let d2=new THREE.DirectionalLight(0x4ea8ff,0.35);d2.position.set(-4,-2,-5);scene.add(d2);
  let gr=new THREE.GridHelper(12,24,0x152040,0x0e1628);gr.position.y=-3.5;scene.add(gr);

  gW=new THREE.Group();gF=new THREE.Group();gA=new THREE.Group();gP=new THREE.Group();
  scene.add(gW);scene.add(gF);scene.add(gA);scene.add(gP);

  initOrb();
  build();
  loop();
}

/* ===========================================================
   ORBIT CONTROLS
   =========================================================== */
let drag=false,pm={x:0,y:0};
let sp={t:0.85,p:1.05,r:8};
let spTgt=null,camAnim=false;

function initOrb(){
  const el=ren.domElement;
  el.addEventListener('pointerdown',e=>{drag=true;camAnim=false;pm={x:e.clientX,y:e.clientY}});
  el.addEventListener('pointermove',e=>{
    if(!drag)return;
    sp.t-=(e.clientX-pm.x)*0.007;
    sp.p=Math.max(0.05,Math.min(Math.PI-0.05,sp.p-(e.clientY-pm.y)*0.007));
    pm={x:e.clientX,y:e.clientY};uCam();
  });
  el.addEventListener('pointerup',()=>drag=false);
  el.addEventListener('pointerleave',()=>drag=false);
  el.addEventListener('wheel',e=>{e.preventDefault();sp.r=Math.max(3,Math.min(20,sp.r+e.deltaY*0.008));uCam()},{passive:false});
  let ld=0;
  el.addEventListener('touchstart',e=>{if(e.touches.length===2){let dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;ld=Math.hypot(dx,dy)}},{passive:true});
  el.addEventListener('touchmove',e=>{if(e.touches.length===2){let dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;let d=Math.hypot(dx,dy);sp.r=Math.max(3,Math.min(20,sp.r-(d-ld)*0.02));ld=d;uCam()}},{passive:true});
  uCam();
}
function uCam(){
  cam.position.set(sp.r*Math.sin(sp.p)*Math.cos(sp.t),sp.r*Math.cos(sp.p),sp.r*Math.sin(sp.p)*Math.sin(sp.t));
  cam.lookAt(0,0,0);
}
function animCam(){
  if(!camAnim||!spTgt)return;
  const e=0.12;
  sp.t+=(spTgt.t-sp.t)*e;sp.p+=(spTgt.p-sp.p)*e;sp.r+=(spTgt.r-sp.r)*e;
  if(Math.abs(sp.t-spTgt.t)<.001&&Math.abs(sp.p-spTgt.p)<.001&&Math.abs(sp.r-spTgt.r)<.01){
    sp.t=spTgt.t;sp.p=spTgt.p;sp.r=spTgt.r;camAnim=false;
  }
  uCam();
}
function goView(v){
  const R=MODE==='solenoid'?10:(MODE==='coil'?9:8);
  if(v==='diag')  spTgt={t:0.85,p:1.05,r:R};
  else if(v==='side') spTgt={t:0,p:Math.PI/2,r:R};
  else if(v==='top')  spTgt={t:0,p:0.08,r:R};
  else if(v==='front')spTgt={t:Math.PI/2,p:Math.PI/2,r:R};
  camAnim=true;
}

/* ===========================================================
   MATERIALS & GEOMETRY
   =========================================================== */
const mW=new THREE.MeshPhongMaterial({color:0x999999,emissive:0x333333,shininess:60});
const mA=new THREE.MeshPhongMaterial({color:0x22d3ee,emissive:0x0a5566});
const mPt=new THREE.MeshBasicMaterial({color:0xff9f43});
const mGl=new THREE.MeshBasicMaterial({color:0xffcc44,transparent:true,opacity:0.45});
const gCone=new THREE.ConeGeometry(0.4,1.2,8);
const gSph=new THREE.SphereGeometry(1,8,6);

function fM(o){return new THREE.LineBasicMaterial({color:0x5eb8ff,transparent:true,opacity:o||0.8})}
function gM(o){return new THREE.LineBasicMaterial({color:0x88ccff,transparent:true,opacity:o||0.22})}

/* ===========================================================
   BUILD SCENE
   =========================================================== */
function clr(){
  [gW,gF,gA,gP].forEach(g=>{while(g.children.length){let c=g.children[0];if(c.geometry)c.geometry.dispose();if(c.material)c.material.dispose();g.remove(c)}});
  parts=[];
}

function build(){
  clr();
  const dir=IV>=0?1:-1, mag=Math.abs(IV)/5;
  if(MODE==='wire')buildWire(dir,mag);
  else if(MODE==='coil')buildCoil(dir,mag);
  else buildSol(dir,mag);
  uInfo();uHand();
}

/* -----------------------------------------------------------
   STRAIGHT WIRE — correct as-is
   dir=+1 → current +y → field circles CW from above
   (In THREE.js screen coords, CW from above is the correct
    right-hand-screw direction for +y current)
   ----------------------------------------------------------- */
function buildWire(dir,mag){
  gW.add(new THREE.Mesh(new THREE.CylinderGeometry(.1,.1,9,20),mW));
  gW.add(new THREE.Mesh(new THREE.CylinderGeometry(.14,.14,9,20),
    new THREE.MeshPhongMaterial({color:0x445566,transparent:true,opacity:.25})));
  if(mag>0) mkPLine([0,-4.2,0],[0,4.2,0],dir,22);
  if(!mag)return;
  // Field lines
  if(showFL){
    const rs=[.45,.8,1.25,1.8,2.4].map(v=>v*(.6+mag*.4));
    const hs=[-2.5,-1.5,-.5,.5,1.5,2.5];
    for(const r of rs)for(const h of hs){mkCL(r,h,72,.8);mkCL(r,h,72,.2,1)}
  }
  // Direction arrows
  const rs=[.45,.8,1.25,1.8,2.4].map(v=>v*(.6+mag*.4));
  for(const r of rs)for(const h of[-2,0,2]){
    const n=r<1?4:6;
    for(let k=0;k<n;k++){
      const a=(k/n)*Math.PI*2;
      const tg=new THREE.Vector3(-Math.sin(a)*dir,0,Math.cos(a)*dir).normalize();
      const sz=Math.min(.18, Math.max(.07, .12*(.5+mag*.4)*(1-r/4)));
      cone(new THREE.Vector3(Math.cos(a)*r,h,Math.sin(a)*r),tg,sz);
    }
  }
}
function mkCL(r,y,seg,op,gl){
  const pts=[];
  for(let i=0;i<=seg;i++){const a=(i/seg)*Math.PI*2;pts.push(new THREE.Vector3(Math.cos(a)*r,y,Math.sin(a)*r))}
  gF.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),gl?gM(op):fM(op)));
}

/* -----------------------------------------------------------
   CIRCULAR COIL
   
   ★ KEY PHYSICS NOTE:
   In THREE.js, (cos(a), 0, sin(a)) with increasing a is
   CLOCKWISE when viewed from +y (because +z points toward viewer).
   
   Current particles follow this CW path for dir=+1.
   Right-hand rule: CW from above → B-field is -y (downward).
   So: bDir = -dir
   ----------------------------------------------------------- */
function buildCoil(dir,mag){
  const R=2;
  const bDir=-dir; // ★ B-field direction along y-axis

  const coil=new THREE.Mesh(new THREE.TorusGeometry(R,.08,16,80),mW);
  coil.rotation.x=Math.PI/2;gW.add(coil);
  // Leads
  const lg=new THREE.CylinderGeometry(.06,.06,2.5,8);
  const l1=new THREE.Mesh(lg,mW);l1.position.set(R,-1.25,0);gW.add(l1);
  const l2=new THREE.Mesh(lg.clone(),mW);l2.position.set(-R,-1.25,0);gW.add(l2);

  if(mag>0)mkPCircle(R,dir,24);
  if(!mag)return;
  if(showFL)buildCoilFL(R,bDir,mag);
  buildCoilArr(R,bDir,mag);
}

function buildCoilFL(R,bDir,mag){
  const azN=8, offs=[0,.35,.7,1.1];
  for(let ai=0;ai<azN;ai++){
    const az=(ai/azN)*Math.PI*2;
    for(const off of offs){
      const pts=[],N=120;
      for(let i=0;i<=N;i++){
        const t=(i/N)*Math.PI*2;
        const lH=(1.3+off*.6)*mag;
        const lW=(R*.35+off*1+.5)*mag;
        const py=Math.sin(t)*lH*bDir;
        const pr=off*.3+Math.cos(t)*lW;
        pts.push(new THREE.Vector3(Math.cos(az)*pr,py,Math.sin(az)*pr));
      }
      const op=off<.1?.9:(off<.5?.7:(off<.9?.55:.4));
      gF.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),fM(op)));
      gF.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts.map(p=>p.clone())),gM(.15)));
    }
  }
}

function buildCoilArr(R,bDir,mag){
  // Central axis arrows
  for(let y=-2.2;y<=2.2;y+=.5){
    const str=Math.max(.2,1-Math.abs(y)/3);
    const sz=Math.min(.18, .12*mag*str);
    if(sz>.03) cone(new THREE.Vector3(0,y*mag*bDir,0),new THREE.Vector3(0,bDir,0),sz);
  }
  // External return arrows
  const azS=[0,Math.PI/2,Math.PI,1.5*Math.PI];
  for(const az of azS){
    for(let d=1.4;d<=2.8;d+=.7){
      const px=Math.cos(az)*d,pz=Math.sin(az)*d;
      // Near N-pole (bDir side): outward
      cone(new THREE.Vector3(px,1.1*mag*bDir,pz),
        new THREE.Vector3(Math.cos(az)*.5,-bDir*.4,Math.sin(az)*.5).normalize(),
        Math.min(.14,.08*mag));
      // Near S-pole (-bDir side): inward
      cone(new THREE.Vector3(px,-1.1*mag*bDir,pz),
        new THREE.Vector3(-Math.cos(az)*.5,bDir*.4,-Math.sin(az)*.5).normalize(),
        Math.min(.14,.08*mag));
    }
  }
}

/* -----------------------------------------------------------
   SOLENOID
   
   ★ Same coordinate fix: bDir = -dir
   The helix winds CW from above for dir=+1, so
   right-hand rule gives B-field in -y direction.
   ----------------------------------------------------------- */
function buildSol(dir,mag){
  const L=4.5, R=1, turns=NC;
  const bDir=-dir; // ★ B-field direction

  const ta=turns*Math.PI*2, hS=turns*40;
  const hp=[];
  for(let i=0;i<=hS;i++){const t=i/hS;const a=t*ta;hp.push(new THREE.Vector3(Math.cos(a)*R,-L/2+t*L,Math.sin(a)*R))}
  const crv=new THREE.CatmullRomCurve3(hp);
  gW.add(new THREE.Mesh(new THREE.TubeGeometry(crv,hS*2,.05,8,false),mW));

  const lg=new THREE.CylinderGeometry(.05,.05,2,8);
  const l1=new THREE.Mesh(lg,mW);l1.position.set(R,-L/2-1,0);gW.add(l1);
  const l2=new THREE.Mesh(lg.clone(),mW);l2.position.set(R,L/2+1,0);gW.add(l2);

  if(mag>0)mkPHelix(R,L,turns,dir,Math.max(24,turns*3));
  if(!mag)return;
  if(showFL)buildSolFL(L,R,bDir,mag);
  buildSolArr(L,R,bDir,mag);
}

function buildSolFL(L,R,bDir,mag){
  const hL=L/2;
  // Internal: straight lines
  const offI=[[0,0],[.3,0],[-.3,0],[0,.3],[0,-.3],[.22,.22],[-.22,.22],[.22,-.22],[-.22,-.22]];
  for(const[ox,oz]of offI){
    const pts=[];
    for(let i=0;i<=40;i++)pts.push(new THREE.Vector3(ox,-hL-.8+(i/40)*(L+1.6),oz));
    gF.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),fM(.85)));
    gF.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts.map(p=>p.clone())),gM(.18)));
  }
  // External: bar-magnet return loops
  const azN=8, eRs=[1,1.7,2.5];
  for(let ai=0;ai<azN;ai++){
    const az=(ai/azN)*Math.PI*2;
    for(const er of eRs){
      const pts=[],N=100;
      for(let i=0;i<=N;i++){
        const t=(i/N)*Math.PI;
        // Field exits N-pole (bDir side), returns to S-pole (-bDir side)
        const y=Math.cos(t)*(hL+1.5)*bDir;
        const outR=R+er*Math.sin(t)*mag+.3;
        pts.push(new THREE.Vector3(Math.cos(az)*outR,y,Math.sin(az)*outR));
      }
      const op=er<1.3?.6:(er<2?.45:.3);
      gF.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),fM(op)));
      gF.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts.map(p=>p.clone())),gM(.1)));
    }
  }
}

function buildSolArr(L,R,bDir,mag){
  const hL=L/2;
  // Internal: uniform field in bDir
  const offI=[[0,0],[.3,0],[-.3,0],[0,.3],[0,-.3]];
  for(const[ox,oz]of offI){
    for(let y=-hL+.5;y<=hL-.5;y+=1.1)
      cone(new THREE.Vector3(ox,y,oz),new THREE.Vector3(0,bDir,0),Math.min(.16,.1*mag));
  }
  // External return arrows
  const azS=[0,Math.PI/2,Math.PI,1.5*Math.PI];
  for(const az of azS){
    const d=R+1.2*mag;
    const px=Math.cos(az)*d,pz=Math.sin(az)*d;
    cone(new THREE.Vector3(px,hL*bDir*.7,pz),
      new THREE.Vector3(Math.cos(az)*.5,-bDir*.5,Math.sin(az)*.5).normalize(),
      Math.min(.14,.08*mag));
    cone(new THREE.Vector3(px,-hL*bDir*.7,pz),
      new THREE.Vector3(-Math.cos(az)*.5,bDir*.5,-Math.sin(az)*.5).normalize(),
      Math.min(.14,.08*mag));
  }
}

/* ===========================================================
   CONE (Arrow) HELPER
   =========================================================== */
function cone(pos,dir,sz){
  const c=new THREE.Mesh(gCone,mA);
  c.position.copy(pos);c.scale.set(sz,sz,sz);
  c.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir.clone().normalize());
  gA.add(c);
}

/* ===========================================================
   CURRENT FLOW PARTICLES
   =========================================================== */
function mkPt(pos){
  const m=new THREE.Mesh(gSph,mPt);m.scale.set(.09,.09,.09);m.position.copy(pos);gP.add(m);
  const g=new THREE.Mesh(gSph,mGl);g.scale.set(.18,.18,.18);g.position.copy(pos);gP.add(g);
  return{m,g};
}

function mkPLine(from,to,dir,n){
  const f=new THREE.Vector3(...from),t2=new THREE.Vector3(...to);
  for(let i=0;i<n;i++){
    const tt=i/n;
    const p=mkPt(new THREE.Vector3().lerpVectors(f,t2,tt));
    parts.push({...p,tp:'L',from:f,to:t2,t:tt,dir,spd:.45});
  }
}

function mkPCircle(R,dir,n){
  for(let i=0;i<n;i++){
    const tt=i/n,a=tt*Math.PI*2;
    const p=mkPt(new THREE.Vector3(Math.cos(a)*R,0,Math.sin(a)*R));
    parts.push({...p,tp:'C',R,t:tt,dir,spd:.35});
  }
}

function mkPHelix(R,L,turns,dir,n){
  const ta=turns*Math.PI*2;
  for(let i=0;i<n;i++){
    const tt=i/n,a=tt*ta,y=-L/2+tt*L;
    const p=mkPt(new THREE.Vector3(Math.cos(a)*R,y,Math.sin(a)*R));
    parts.push({...p,tp:'H',R,L,ta,t:tt,dir,spd:.28});
  }
}

function uParts(dt){
  for(const p of parts){
    p.t=(p.t+p.spd*dt*p.dir+1)%1;
    if(p.t<0)p.t+=1;
    let pos;
    if(p.tp==='L')pos=new THREE.Vector3().lerpVectors(p.from,p.to,p.t);
    else if(p.tp==='C'){const a=p.t*Math.PI*2;pos=new THREE.Vector3(Math.cos(a)*p.R,0,Math.sin(a)*p.R)}
    else{const a=p.t*p.ta;pos=new THREE.Vector3(Math.cos(a)*p.R,-p.L/2+p.t*p.L,Math.sin(a)*p.R)}
    if(pos){p.m.position.copy(pos);p.g.position.copy(pos)}
  }
}

/* ===========================================================
   ANIMATION LOOP
   =========================================================== */
let lt=performance.now();
function loop(){
  requestAnimationFrame(loop);
  const now=performance.now(),dt=Math.min((now-lt)/1000,.05);lt=now;at+=dt;
  uParts(dt);
  animCam();
  let i=0;
  gF.children.forEach(c=>{if(c.material&&c.material.opacity<.3){c.material.opacity=.1+.12*Math.sin(at*2.5+i*.3)}i++});
  ren.render(scene,cam);
}

/* ===========================================================
   UI
   =========================================================== */
function setMode(m){
  MODE=m;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.mode===m));
  document.getElementById('ncr').classList.toggle('show',m==='solenoid');
  const R=m==='solenoid'?10:(m==='coil'?9:8);
  sp={t:.85,p:1.05,r:R};camAnim=false;uCam();build();
}
function setI(v){IV=+v;document.getElementById('iv').textContent=v+' A';build()}
function setN(v){NC=+v;document.getElementById('nv').textContent=v;build()}
function togF(){showFL=!showFL;document.getElementById('bf').classList.toggle('active',showFL);build()}
function togH(){showRH=!showRH;document.getElementById('bh').classList.toggle('active',showRH);document.getElementById('rh').classList.toggle('show',showRH);uHand()}

/* ===========================================================
   INFO & RIGHT-HAND RULE
   =========================================================== */
function uInfo(){
  const t=document.getElementById('it'),d=document.getElementById('id'),f=document.getElementById('fm');
  if(MODE==='wire'){t.textContent='直線電流の磁場';d.textContent='導線を中心に同心円状の磁場が生じます。電流から離れるほど弱くなります。';f.textContent='H = I / (2πr)'}
  else if(MODE==='coil'){t.textContent='円形コイルの磁場';d.textContent='コイル中心を貫く磁場が生じ、外側では棒磁石のように戻ります。';f.textContent='H = I / (2a)  （中心）'}
  else{t.textContent='ソレノイドの磁場';d.textContent='内部にほぼ一様な強い磁場が生じます。外部は棒磁石と同じ形。';f.textContent='H = nI  （内部）'}
}

function uHand(){
  if(!showRH)return;
  const d=document.getElementById('rd'),sv=document.getElementById('rs');
  const dir=IV>=0?1:-1;
  if(MODE==='wire'){
    d.textContent=dir>0?'親指を電流の向き（上↑）に立てると、4本の指の巻く向きが磁場の向き':'親指を電流の向き（下↓）に立てると、4本の指の巻く向きが磁場の向き';
    sv.innerHTML=svW(dir);
  }else{
    d.textContent='右手の4本の指を電流の向きに巻くと、親指の向きが磁場（N極側）の向き';
    sv.innerHTML=svC(dir);
  }
}

function svW(d){
  const hy=d>0?25:115,hd=d>0?'M78,40 L85,25 L92,40':'M78,100 L85,115 L92,100';
  return`<rect x="81" y="18" width="8" height="104" rx="4" fill="#888"/>
  <path d="${hd}" stroke="#ff9f43" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="100" y="${hy+4}" fill="#ff9f43" font-size="11" font-weight="bold" font-family="Noto Sans JP">電流</text>
  <path d="M55,70 A30,30 0 1,${d>0?1:0} 85,40" stroke="#5eb8ff" stroke-width="2.5" fill="none" stroke-dasharray="5,3"/>
  <text x="8" y="55" fill="#5eb8ff" font-size="10" font-family="Noto Sans JP">磁場</text>`;
}
function svC(d){
  // ★ bDir=-d for display consistency
  const bd=-d;
  const ay=bd>0?18:124,hd=bd>0?'M78,30 L85,16 L92,30':'M78,110 L85,124 L92,110';
  return`<ellipse cx="85" cy="78" rx="52" ry="22" stroke="#888" stroke-width="3" fill="none"/>
  <path d="M37,83 Q25,78 37,73" stroke="#ff9f43" stroke-width="2.5" fill="none"/>
  <path d="M133,73 Q145,78 133,83" stroke="#ff9f43" stroke-width="2.5" fill="none"/>
  <text x="12" y="100" fill="#ff9f43" font-size="10" font-weight="bold" font-family="Noto Sans JP">電流</text>
  <line x1="85" y1="78" x2="85" y2="${ay}" stroke="#5eb8ff" stroke-width="2.5" stroke-dasharray="5,3"/>
  <path d="${hd}" stroke="#5eb8ff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <text x="96" y="${ay+4}" fill="#5eb8ff" font-size="11" font-weight="bold" font-family="Noto Sans JP">磁場</text>`;
}

/* ===========================================================
   RESIZE
   =========================================================== */
addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight)});

/* ===========================================================
   START
   =========================================================== */
init();
</script>
